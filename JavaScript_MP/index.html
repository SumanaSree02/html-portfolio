<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN CONTAINER */
.container{
    width:95%;
    height:90vh;
    display:flex;
    gap:20px;
}

/* LEFT FORM PANEL */
.form-panel{
    width:30%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius:18px;
    padding:25px;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.form-panel h2{
    text-align:center;
    margin-bottom:15px;
    color:#ffffff;
    letter-spacing:1px;
}

.form-panel input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

.form-panel button{
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

#addBtn{
    background:#00c6ff;
    color:white;
}

#addBtn:hover{
    background:#0096c7;
}

#cancelBtn{
    background:#ff4d4d;
    color:white;
    display:none;
}

/* RIGHT PANEL */
.table-panel{
    width:70%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius:18px;
    padding:20px;
    overflow:auto;
}

.table-panel h2{
    color:white;
    margin-bottom:15px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    color:white;
}

th, td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

th{
    background: rgba(0,0,0,0.2);
}

tr:hover{
    background: rgba(255,255,255,0.1);
}

/* BUTTONS */
.edit-btn, .delete-btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin:2px;
    color:white;
}

.edit-btn{
    background:#f39c12;
}

.delete-btn{
    background:#e74c3c;
}

/* ERROR */
#error{
    color:#ff6b6b;
    font-size:13px;
    margin-top:5px;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

    <!-- FORM PANEL -->
    <div class="form-panel">
        <h2>🎓 Student Form</h2>

        <input type="text" id="name" placeholder="Student Name">
        <input type="text" id="roll" placeholder="Roll Number">
        <input type="text" id="dept" placeholder="Department">

        <div id="error"></div>

        <button id="addBtn" onclick="handleSubmit()">Add Student</button>
        <button id="cancelBtn" onclick="resetForm()">Cancel Edit</button>
    </div>

    <!-- TABLE PANEL -->
    <div class="table-panel">
        <h2>📋 Student Records</h2>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Department</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>

let students = [];
let editId = null;

/* ADD / UPDATE */
function handleSubmit(){

    let name = document.getElementById("name").value.trim();
    let roll = document.getElementById("roll").value.trim();
    let dept = document.getElementById("dept").value.trim();
    let error = document.getElementById("error");

    if(name === "" || roll === "" || dept === ""){
        error.innerText = "⚠ All fields are required!";
        return;
    }

    if(isNaN(roll)){
        error.innerText = "⚠ Roll number must be numeric!";
        return;
    }

    error.innerText = "";

    if(editId){
        students = students.map(s =>
            s.id === editId ? {...s, name, roll, dept} : s
        );

        editId = null;
        setAddMode();
    }else{
        students.push({
            id: Date.now(),
            name,
            roll,
            dept
        });
    }

    clearInputs();
    renderTable();
}

/* RENDER TABLE */
function renderTable(){

    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    students.forEach(s => {

        let row = document.createElement("tr");

        row.innerHTML = `
            <td>${s.name}</td>
            <td>${s.roll}</td>
            <td>${s.dept}</td>
            <td></td>
        `;

        let actionCell = row.querySelector("td:last-child");

        let editBtn = document.createElement("button");
        editBtn.innerText = "Edit";
        editBtn.classList.add("edit-btn");
        editBtn.onclick = () => editStudent(s);

        let delBtn = document.createElement("button");
        delBtn.innerText = "Delete";
        delBtn.classList.add("delete-btn");
        delBtn.onclick = () => deleteStudent(s.id);

        actionCell.appendChild(editBtn);
        actionCell.appendChild(delBtn);

        tbody.appendChild(row);
    });
}

/* EDIT */
function editStudent(s){
    editId = s.id;

    document.getElementById("name").value = s.name;
    document.getElementById("roll").value = s.roll;
    document.getElementById("dept").value = s.dept;

    document.getElementById("addBtn").innerText = "Update Student";
    document.getElementById("cancelBtn").style.display = "block";
}

/* DELETE */
function deleteStudent(id){
    students = students.filter(s => s.id !== id);
    renderTable();
}

/* RESET */
function resetForm(){
    editId = null;
    clearInputs();
    setAddMode();
}

/* UI RESET */
function setAddMode(){
    document.getElementById("addBtn").innerText = "Add Student";
    document.getElementById("cancelBtn").style.display = "none";
}

/* CLEAR */
function clearInputs(){
    document.getElementById("name").value = "";
    document.getElementById("roll").value = "";
    document.getElementById("dept").value = "";
}

</script>

</body>
</html>
